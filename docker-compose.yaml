# Use postgres/example user/password credentials

services:

  db:
    image: postgres:16-alpine
    container_name: team_tasks_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: team_tasks
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - team_tasks_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d team_tasks"]
      interval: 5s
      timeout: 5s
      retries: 20

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080

volumes:
  team_tasks_pgdata:
